name: Release Widget

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      # [버전 자동 주입] 태그(v0.1.17)를 유일한 진실로 삼아 tauri.conf.json 에 박아넣는다.
      # 이걸 안 하면 tauri.conf.json 버전이 낮은 채로 빌드돼서, latest.json 은 새 버전이라 알리는데
      # 설치본은 옛 버전 → 업데이트가 영원히 사라지지 않는 무한루프가 생긴다. (v0.1.17 에서 실제 발생)
      - name: tauri.conf.json 버전을 태그와 일치시키기
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::태그 형식이 vX.Y.Z 가 아닙니다: $TAG"
            exit 1
          fi
          VERSION="$VERSION" node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            const before = j.version;
            j.version = process.env.VERSION;
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
            console.log('tauri.conf.json version: ' + before + ' -> ' + j.version);
          "

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Office Widget ${{ github.ref_name }}"
          releaseBody: "Auto update release"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      # tauri-action 의 latest.json 자동생성이 동작하지 않아(v0.1.11~14 모두 수동 첨부였음)
      # 여기서 직접 만들어 릴리즈에 올린다. 이 단계가 있어야 PC위젯 자동업데이트가 뜬다.
      - name: latest.json 생성·첨부
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          SIG_PATH=$(find src-tauri/target/release/bundle -name "*-setup.exe.sig" | head -n 1)
          if [ -z "${SIG_PATH:-}" ]; then
            echo "::error::.sig 파일을 찾지 못했습니다. (createUpdaterArtifacts / 서명키 확인)"
            find src-tauri/target/release/bundle -name "*.sig" || true
            exit 1
          fi
          echo "서명 파일: $SIG_PATH"

          ASSET=$(gh release view "$TAG" --json assets --jq '.assets[] | select(.name | endswith("-setup.exe")) | .name' | head -n 1)
          if [ -z "${ASSET:-}" ]; then
            echo "::error::릴리즈에서 setup.exe 자산을 찾지 못했습니다."
            gh release view "$TAG" --json assets --jq '.assets[].name' || true
            exit 1
          fi
          echo "설치본 자산: $ASSET"

          NOTES=$(git tag -l --format='%(contents)' "$TAG" || true)
          if [ -z "${NOTES:-}" ]; then
            echo "태그 메시지 없음 → 기본 문구 사용"
          else
            echo "릴리즈 노트: $NOTES"
          fi

          export SIG_PATH ASSET NOTES
          node .github/scripts/make-latest-json.mjs

          gh release upload "$TAG" latest.json --clobber
          echo "latest.json 첨부 완료"

      - name: 자동업데이트 확인 (검증)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          NAMES=$(gh release view "$TAG" --json assets --jq '.assets[].name')
          echo "$NAMES"

          echo "$NAMES" | grep -q '^latest.json$' \
            || { echo "::error::latest.json 이 없습니다 - 업데이트가 뜨지 않습니다."; exit 1; }

          # 설치본 파일명에 태그 버전이 들어있어야 한다.
          # (없으면 tauri.conf.json 버전과 태그가 어긋난 것 → 업데이트 무한루프)
          echo "$NAMES" | grep -q "_${VERSION}_.*-setup.exe$" \
            || { echo "::error::설치본 파일명에 버전 ${VERSION} 이 없습니다. 태그와 앱 버전이 어긋났습니다."; exit 1; }

          echo "OK: 설치본 버전 = latest.json 버전 = ${VERSION}. PC위젯 업데이트가 정상 동작합니다."
